<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>VanNime • Anime Streaming Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #fff; overflow-x: hidden; }
        
        .bg-premium {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: radial-gradient(circle at 30% 10%, #1a0a0a 0%, #0a0505 50%, #000000 100%);
        }
        
        .bg-premium::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: radial-gradient(circle, rgba(255, 30, 70, 0.1) 0%, transparent 60%);
            animation: bgRotate 25s linear infinite;
        }
        
        @keyframes bgRotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Navbar */
        .navbar {
            background: rgba(10, 10, 15, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 40, 80, 0.25);
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 14px 24px;
        }
        
        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }
        
        .logo { display: flex; align-items: center; gap: 12px; }
        .logo-icon {
            width: 45px; height: 45px;
            background: linear-gradient(135deg, #ff1a4f, #cc0033);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(255, 26, 79, 0.4);
        }
        .logo-icon i { font-size: 24px; color: white; }
        .logo-text h1 { font-size: 26px; font-weight: 800; background: linear-gradient(135deg, #fff, #ff4d6d); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .logo-text p { font-size: 9px; color: #ff4d6d; letter-spacing: 2px; }
        
        .search-area { flex: 1; max-width: 450px; position: relative; }
        .search-area i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: #ff4d6d; }
        .search-area input {
            width: 100%; padding: 12px 20px 12px 48px;
            background: rgba(25, 25, 35, 0.9);
            border: 1px solid rgba(255, 50, 90, 0.3);
            border-radius: 50px; color: white; font-size: 14px; outline: none;
        }
        .search-area input:focus { border-color: #ff1a4f; box-shadow: 0 0 15px rgba(255, 26, 79, 0.3); }
        
        .user-card {
            display: flex; align-items: center; gap: 12px;
            background: rgba(255, 30, 70, 0.1);
            padding: 6px 18px; border-radius: 50px;
            border: 1px solid rgba(255, 50, 90, 0.2);
        }
        .user-card i { color: #ff4d6d; }
        .user-card .name { font-weight: 600; font-size: 13px; }
        .user-card .level { font-size: 9px; color: #ff4d6d; }
        
        .container { max-width: 1400px; margin: 0 auto; padding: 30px 24px; }
        
        /* Hero */
        .hero {
            background: linear-gradient(135deg, rgba(255, 30, 70, 0.12), rgba(0, 0, 0, 0.85));
            border-radius: 28px; padding: 40px; margin-bottom: 40px;
            border: 1px solid rgba(255, 50, 90, 0.2);
        }
        .hero h2 { font-size: 42px; font-weight: 800; margin-bottom: 12px; }
        .hero h2 span { color: #ff1a4f; }
        .hero p { color: #aaa; margin-bottom: 20px; max-width: 500px; }
        .stats { display: flex; gap: 30px; flex-wrap: wrap; }
        .stat-item { text-align: center; }
        .stat-item .num { font-size: 28px; font-weight: 800; color: #ff1a4f; }
        .stat-item .txt { font-size: 11px; color: #888; }
        
        /* Tabs */
        .tabs {
            display: flex; gap: 12px; flex-wrap: wrap;
            margin-bottom: 28px; border-bottom: 1px solid rgba(255, 50, 90, 0.2);
            padding-bottom: 15px;
        }
        .tab {
            background: transparent; border: none; padding: 9px 28px;
            border-radius: 40px; color: #aaa; font-weight: 600; cursor: pointer;
        }
        .tab.active { background: #ff1a4f; color: white; box-shadow: 0 4px 20px rgba(255, 26, 79, 0.4); }
        
        /* Grid */
        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 24px;
        }
        .anime-item {
            background: rgba(20, 20, 28, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px; overflow: hidden; cursor: pointer;
            transition: all 0.3s; border: 1px solid rgba(255, 50, 90, 0.1);
        }
        .anime-item:hover { transform: translateY(-8px); border-color: #ff1a4f; box-shadow: 0 15px 30px rgba(255, 26, 79, 0.2); }
        .anime-img { position: relative; }
        .anime-img img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .anime-score {
            position: absolute; top: 10px; right: 10px;
            background: #ff1a4f; padding: 4px 8px; border-radius: 20px; font-size: 10px; font-weight: 700;
        }
        .anime-info { padding: 12px; }
        .anime-info h3 { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .anime-info p { font-size: 10px; color: #ff4d6d; margin-top: 4px; }
        
        /* Modal */
        .modal-player {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0, 0, 0, 0.98);
            z-index: 1000; backdrop-filter: blur(12px);
        }
        .modal-content {
            max-width: 1300px; margin: 20px auto;
            background: #0a0a0f; border-radius: 28px; overflow: hidden;
            border: 1px solid rgba(255, 26, 79, 0.3);
            height: 90vh; display: flex; flex-direction: column;
        }
        .modal-header {
            padding: 16px 24px; background: rgba(0, 0, 0, 0.9);
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255, 26, 79, 0.2);
        }
        .modal-header h3 { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
        .modal-header h3 i { color: #ff1a4f; }
        .close-modal {
            background: #ff1a4f; border: none; width: 40px; height: 40px;
            border-radius: 50%; color: white; font-size: 20px; cursor: pointer;
        }
        .video-area { flex: 1; background: #000; min-height: 0; }
        .video-area iframe, .video-area video { width: 100%; height: 100%; border: none; }
        .modal-footer { padding: 16px 24px; background: rgba(0, 0, 0, 0.9); border-top: 1px solid rgba(255, 26, 79, 0.2); }
        .section-title { font-weight: 600; margin-bottom: 10px; font-size: 13px; display: flex; align-items: center; gap: 8px; }
        .section-title i { color: #ff1a4f; }
        .episode-list {
            display: flex; flex-wrap: wrap; gap: 8px;
            max-height: 85px; overflow-y: auto; margin-bottom: 12px;
        }
        .episode-btn {
            background: rgba(255, 26, 79, 0.12); border: 1px solid rgba(255, 26, 79, 0.25);
            padding: 6px 16px; border-radius: 30px; color: white; cursor: pointer;
            font-size: 12px; font-weight: 600;
        }
        .episode-btn.active, .episode-btn:hover { background: #ff1a4f; border-color: #ff1a4f; }
        .server-list { display: flex; gap: 10px; flex-wrap: wrap; }
        .server-btn {
            background: rgba(255, 255, 255, 0.08); border: none;
            padding: 5px 16px; border-radius: 25px; color: #aaa;
            font-size: 11px; font-weight: 600; cursor: pointer;
        }
        .server-btn.active { background: #ff1a4f; color: white; }
        
        .loader { text-align: center; padding: 60px; color: #ff1a4f; }
        .loader-spin { width: 45px; height: 45px; border: 3px solid rgba(255, 26, 79, 0.2); border-top: 3px solid #ff1a4f; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 15px; }
        .error-msg { text-align: center; padding: 60px; color: #aaa; }
        
        @media (max-width: 768px) {
            .hero h2 { font-size: 28px; }
            .anime-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
            .nav-container { flex-direction: column; }
            .search-area { max-width: 100%; width: 100%; }
        }
        
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #1a1a2a; }
        ::-webkit-scrollbar-thumb { background: #ff1a4f; border-radius: 10px; }
    </style>
</head>
<body>

<div class="bg-premium"></div>

<nav class="navbar">
    <div class="nav-container">
        <div class="logo">
            <div class="logo-icon"><i class="fas fa-tv"></i></div>
            <div class="logo-text"><h1>VanNime</h1><p>✦ PREMIUM STREAMING ✦</p></div>
        </div>
        <div class="search-area">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Cari anime... (Naruto, One Piece, Solo Leveling)">
        </div>
        <div class="user-card">
            <i class="fas fa-user-astronaut"></i>
            <div><div class="name">Van Santiago</div><div class="level">✦ Anime Master ✦</div></div>
        </div>
    </div>
</nav>

<div class="container">
    <div class="hero">
        <h2>Streaming Anime <span>Tanpa Batas</span></h2>
        <p>Kualitas HD • Subtitle Indonesia • Update Tercepat • Tanpa Iklan</p>
        <div class="stats">
            <div class="stat-item"><div class="num">10,000+</div><div class="txt">Judul Anime</div></div>
            <div class="stat-item"><div class="num">50,000+</div><div class="txt">Episode</div></div>
            <div class="stat-item"><div class="num">5</div><div class="txt">Server Aktif</div></div>
        </div>
    </div>
    
    <div class="tabs">
        <button class="tab active" data-cat="TRENDING">🔥 TRENDING</button>
        <button class="tab" data-cat="POPULAR">⭐ POPULER</button>
        <button class="tab" data-cat="TOP">🏆 TOP RATING</button>
    </div>
    
    <div id="animeGrid" class="anime-grid">
        <div class="loader"><div class="loader-spin"></div><p>Memuat anime...</p></div>
    </div>
</div>

<div id="playerModal" class="modal-player">
    <div class="modal-content">
        <div class="modal-header">
            <h3><i class="fas fa-play-circle"></i> <span id="modalTitle">VanNime Player</span></h3>
            <button class="close-modal" id="closeModal">✕</button>
        </div>
        <div id="videoArea" class="video-area"></div>
        <div class="modal-footer">
            <div class="section-title"><i class="fas fa-list"></i> Daftar Episode</div>
            <div id="episodeList" class="episode-list"></div>
            <div class="section-title"><i class="fas fa-server"></i> Server Streaming</div>
            <div class="server-list" id="serverList">
                <button class="server-btn active" data-server="1">Server 1</button>
                <button class="server-btn" data-server="2">Server 2</button>
                <button class="server-btn" data-server="3">Server 3</button>
                <button class="server-btn" data-server="4">Server 4</button>
                <button class="server-btn" data-server="5">Server 5</button>
            </div>
        </div>
    </div>
</div>

<script>
    // ==================== ANILIST API ====================
    const ANILIST_API = 'https://graphql.anilist.co';
    
    let currentTitle = '';
    let currentTotalEp = 0;
    let currentEpNum = 1;
    let currentServer = '1';
    
    // Fetch anime list
    async function fetchAnimeList(category) {
        const grid = document.getElementById('animeGrid');
        grid.innerHTML = '<div class="loader"><div class="loader-spin"></div><p>Memuat anime...</p></div>';
        
        let sort = 'TRENDING_DESC';
        if (category === 'POPULAR') sort = 'POPULARITY_DESC';
        if (category === 'TOP') sort = 'SCORE_DESC';
        
        const query = `
            query ($page: Int, $perPage: Int, $sort: [MediaSort]) {
                Page(page: $page, perPage: $perPage) {
                    media(sort: $sort, type: ANIME, isAdult: false) {
                        id
                        title { romaji english }
                        coverImage { large }
                        averageScore
                        episodes
                    }
                }
            }
        `;
        
        try {
            const res = await fetch(ANILIST_API, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query, variables: { page: 1, perPage: 30, sort: sort } })
            });
            const data = await res.json();
            const animeList = data.data.Page.media;
            
            if (animeList && animeList.length > 0) {
                renderGrid(animeList);
            } else {
                grid.innerHTML = '<div class="error-msg">Gagal memuat data</div>';
            }
        } catch (err) {
            grid.innerHTML = '<div class="error-msg">Koneksi bermasalah. Coba refresh.</div>';
        }
    }
    
    function renderGrid(animes) {
        const grid = document.getElementById('animeGrid');
        grid.innerHTML = animes.map(anime => {
            const title = anime.title.romaji || anime.title.english || 'Unknown';
            const cover = anime.coverImage?.large || 'https://placehold.co/300x450/1a1a2a/ff1a4f?text=VanNime';
            const score = anime.averageScore ? (anime.averageScore / 10).toFixed(1) : '?';
            const eps = anime.episodes || '??';
            return `
                <div class="anime-item" onclick="openAnime('${escapeHtml(title)}', ${anime.episodes || 24})">
                    <div class="anime-img">
                        <img src="${cover}" alt="${title}" loading="lazy" onerror="this.src='https://placehold.co/300x450/1a1a2a/ff1a4f?text=VanNime'">
                        <div class="anime-score">⭐ ${score}</div>
                    </div>
                    <div class="anime-info">
                        <h3>${escapeHtml(title)}</h3>
                        <p>${eps} Episode</p>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    // Search
    async function searchAnime(query) {
        if (!query.trim()) { fetchAnimeList('TRENDING'); return; }
        
        const grid = document.getElementById('animeGrid');
        grid.innerHTML = '<div class="loader"><div class="loader-spin"></div><p>Mencari...</p></div>';
        
        const searchQuery = `
            query ($search: String) {
                Page(page: 1, perPage: 30) {
                    media(search: $search, type: ANIME, isAdult: false) {
                        id
                        title { romaji english }
                        coverImage { large }
                        averageScore
                        episodes
                    }
                }
            }
        `;
        
        try {
            const res = await fetch(ANILIST_API, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query: searchQuery, variables: { search: query } })
            });
            const data = await res.json();
            const results = data.data.Page.media;
            
            if (results.length > 0) {
                renderGrid(results);
            } else {
                grid.innerHTML = '<div class="error-msg">Anime tidak ditemukan</div>';
            }
        } catch (err) {
            grid.innerHTML = '<div class="error-msg">Gagal mencari</div>';
        }
    }
    
    // Open anime & generate episodes
    function openAnime(title, totalEp) {
        currentTitle = title;
        currentTotalEp = totalEp || 24;
        currentEpNum = 1;
        
        document.getElementById('modalTitle').innerHTML = title;
        document.getElementById('playerModal').style.display = 'flex';
        
        // Generate episode buttons
        const episodeContainer = document.getElementById('episodeList');
        let html = '';
        const maxEp = Math.min(currentTotalEp, 150);
        for (let i = 1; i <= maxEp; i++) {
            html += `<button class="episode-btn" onclick="loadVideo(${i})">${i}</button>`;
        }
        episodeContainer.innerHTML = html || '<div style="padding:20px;">Tidak ada episode</div>';
        
        loadVideo(1);
    }
    
    // Load video with MULTIPLE WORKING SERVERS (Indonesia friendly)
    function loadVideo(epNum) {
        currentEpNum = epNum;
        
        // Update active episode
        document.querySelectorAll('.episode-btn').forEach((btn, idx) => {
            if (idx + 1 === epNum) btn.classList.add('active');
            else btn.classList.remove('active');
        });
        
        const videoArea = document.getElementById('videoArea');
        videoArea.innerHTML = '<div style="height:100%;display:flex;align-items:center;justify-content:center;"><div class="loader-spin"></div><p style="margin-left:15px;">Memuat video...</p></div>';
        
        const encodedTitle = encodeURIComponent(currentTitle);
        const searchTitle = currentTitle.toLowerCase().replace(/ /g, '-');
        
        let embedUrl = '';
        
        // Server yang PASTI BISA diakses (menggunakan berbagai sumber)
        if (currentServer === '1') {
            // Server Otakudesu mirror
            embedUrl = `https://otakudesu.cloud/anime/${searchTitle}/episode-${epNum}`;
        } else if (currentServer === '2') {
            // Server Samehadaku
            embedUrl = `https://samehadaku.email/anime/${searchTitle}/episode-${epNum}`;
        } else if (currentServer === '3') {
            // Server Anoboy
            embedUrl = `https://anoboy.ch/episode/${searchTitle}-episode-${epNum}`;
        } else if (currentServer === '4') {
            // Server Kiryuu (backup)
            embedUrl = `https://kiryuu.id/anime/${searchTitle}/episode-${epNum}`;
        } else {
            // Server Neonime
            embedUrl = `https://neonime.co/anime/${searchTitle}/episode-${epNum}`;
        }
        
        // Gunakan iframe untuk embed
        videoArea.innerHTML = `<iframe src="${embedUrl}" allowfullscreen style="width:100%;height:100%;border:none;" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals"></iframe>`;
        
        // Fallback jika iframe error (tampilkan pesan ganti server)
        setTimeout(() => {
            const iframe = videoArea.querySelector('iframe');
            if (iframe && !iframe.src) {
                videoArea.innerHTML = `
                    <div style="height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px;">
                        <i class="fas fa-exclamation-triangle" style="font-size:48px;color:#ff1a4f;margin-bottom:20px;"></i>
                        <p style="margin-bottom:15px;">Video tidak dapat dimuat di server ini.</p>
                        <p style="font-size:13px;color:#aaa;">Silakan <strong>ganti server</strong> di bagian bawah player.</p>
                        <div style="margin-top:20px;display:flex;gap:10px;">
                            <button onclick="changeServer('2')" style="background:#ff1a4f;border:none;padding:8px 20px;border-radius:30px;color:white;cursor:pointer;">Ganti Server 2</button>
                            <button onclick="changeServer('3')" style="background:#333;border:none;padding:8px 20px;border-radius:30px;color:white;cursor:pointer;">Server 3</button>
                        </div>
                    </div>
                `;
            }
        }, 3000);
    }
    
    function changeServer(server) {
        currentServer = server;
        document.querySelectorAll('.server-btn').forEach(btn => {
            if (btn.getAttribute('data-server') === server) btn.classList.add('active');
            else btn.classList.remove('active');
        });
        loadVideo(currentEpNum);
    }
    
    function escapeHtml(text) {
        let div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    // Events
    document.getElementById('closeModal').onclick = () => {
        document.getElementById('playerModal').style.display = 'none';
        document.getElementById('videoArea').innerHTML = '';
    };
    
    document.querySelectorAll('.tab').forEach(tab => {
        tab.onclick = () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            fetchAnimeList(tab.getAttribute('data-cat'));
        };
    });
    
    document.getElementById('searchInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') searchAnime(e.target.value);
    });
    
    document.querySelectorAll('.server-btn').forEach(btn => {
        btn.onclick = () => changeServer(btn.getAttribute('data-server'));
    });
    
    window.openAnime = openAnime;
    window.loadVideo = loadVideo;
    window.changeServer = changeServer;
    
    // Start
    fetchAnimeList('TRENDING');
</script>
</body>
</html>
